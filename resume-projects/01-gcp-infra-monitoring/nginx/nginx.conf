# ============================================================
# nginx/nginx.conf — Reverse proxy config
# In production this is rendered by 03_setup_nginx.sh with
# real private IPs injected. This file is the reference template.
# ============================================================

upstream app_backend {
    # Replace with actual private IPs of your app VMs
    server 10.0.2.10:8080;   # app-server-1
    server 10.0.2.11:8080;   # app-server-2
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Proxy all traffic to backend pool
    location / {
        proxy_pass          http://app_backend;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Health check — used by Cloud Monitoring uptime check
    location /healthz {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
