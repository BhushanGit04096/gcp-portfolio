apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config    # ← ConfigMap name
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'flask-metrics'
        metrics_path: /metrics
        static_configs:
          - targets: ['flask-metrics-service:80']